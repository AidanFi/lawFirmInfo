<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>County Data — Kansas Law Firm Directory</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .county-page { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    .county-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .county-page-title { font-weight: 700; font-size: 22px; }
    .back-link { color: var(--accent); text-decoration: none; font-size: 13px; }
    .back-link:hover { text-decoration: underline; }
    .county-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .county-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: border-color .15s; }
    .county-card:hover { border-color: var(--accent); }
    .county-card-name { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
    .county-card-meta { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
    .county-card-meta span { margin-right: 14px; }
    .download-btn { display: inline-block; background: var(--accent); color: white; padding: 8px 18px; border-radius: var(--radius-sm); text-decoration: none; font-size: 13px; font-weight: 500; transition: opacity .15s; }
    .download-btn:hover { opacity: 0.85; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state h2 { font-size: 18px; color: var(--subtle); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="app-title">Kansas Law Firm Directory</span>
    <nav class="tabs">
      <a href="index.html" class="tab">Directory</a>
      <a href="county-data.html" class="tab active">County Data</a>
    </nav>
  </header>

  <div class="county-page">
    <div class="county-page-header">
      <div class="county-page-title">County Data</div>
      <a href="index.html" class="back-link">Back to Directory</a>
    </div>
    <div id="county-grid" class="county-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <h2>No county data available yet</h2>
      <p>Run the county pipeline to generate data files.</p>
    </div>
  </div>

  <script src="county-data.js"></script>
</body>
</html>
